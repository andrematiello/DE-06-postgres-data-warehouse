services:
  warehouse:
    image: postgres:16
    container_name: de06_warehouse
    environment:
      POSTGRES_USER: dwh
      POSTGRES_PASSWORD: dwh_local_dev # local-only demo credential; this stack never leaves localhost
      POSTGRES_DB: datawarehouse
    ports:
      - "5432:5432"
    volumes:
      - warehouse_data:/var/lib/postgresql/data
      # Mounted read-only so server-side COPY can reach the CSVs; the database can never modify the sources.
      - ./datasets:/data/datasets:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dwh -d datawarehouse"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  warehouse_data:
